<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Faraway</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Shrikhand&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --cream:   #f0ece3;
      --muted:   rgba(240, 236, 227, 0.42);
      --dark:    #04040f;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--dark);
      color: var(--cream);
    }

    /* ── Background video ───────────────────────────────── */
    .bg-video {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
      pointer-events: none;
    }

    /* ── Page layout ─────────────────────────────────────── */
    .page {
      position: fixed;
      inset: 0;
      z-index: 2;
      display: grid;
      grid-template-rows: auto 1fr;
      padding: clamp(1.8rem, 4vw, 3.5rem) clamp(1rem, 4vw, 3rem) 2rem;
    }

    /* ── Header / title ─────────────────────────────────── */
    .header {
      text-align: center;
      opacity: 0;
      animation: riseIn 2s cubic-bezier(0.22, 1, 0.36, 1) forwards 0.2s;
    }

    .title {
      font-family: 'Shrikhand', serif;
      font-weight: 400;
      font-size: clamp(2.8rem, 7.5vw, 6.5rem);
      letter-spacing: 0.05em;
      color: #ffe767;
      line-height: 1;
      text-shadow: 0 2px 8px rgba(0,0,0,0.3);
      /*text-shadow: 0 2px 20px rgba(255,255,255,0.3), 0 0 20px rgba(255,255,255,0.3);*/
    }

    .subtitle {
      display: block;
      margin-top: 0.6em;
      font-family: 'Jost', sans-serif;
      font-weight: 100;
      font-size: clamp(0.6rem, 1.4vw, 0.82rem);
      letter-spacing: 0.48em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ── Center: Vimeo embed ─────────────────────────────── */
    .main {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .embed-shell {
      opacity: 0;
      animation: riseIn 2.2s cubic-bezier(0.22, 1, 0.36, 1) forwards 0.9s;
      width: min(680px, 88vw);
    }

    .vimeo-ratio {
      position: relative;
      padding-top: 56.25%;
      border-radius: 3px;
      overflow: hidden;
      box-shadow:
        0 0 0 1px rgba(240, 236, 227, 0.08),
        0 8px 60px rgba(4, 4, 15, 0.85),
        0 2px 12px rgba(4, 4, 15, 0.6);
    }

    .vimeo-ratio iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
    }

    /* ── Animations ──────────────────────────────────────── */
    @keyframes riseIn {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── INTRO WOLKEN ──────────────────────────────────────
       Zwei große Wolken die den Screen bedecken.
       Nach 2s gleiten sie auf und ab raus (1.4s Dauer).
    ─────────────────────────────────────────────────────── */

    .cloud-intro-left {
      position: fixed;
      z-index: 5;
      pointer-events: none;
      width: 110vw;
      left: -30vw;
      top: 25%;
      animation: introLeaveLeft 1.4s cubic-bezier(0.55, 0, 1, 0.45) forwards 0.2s;
    }
    
    .cloud-intro-right {
      position: fixed;
      z-index: 5;
      pointer-events: none;
      width: 110vw;
      left: 20vw;
      top: 22%;
      animation: introLeaveRight 1.4s cubic-bezier(0.55, 0, 1, 0.45) forwards 0.2s;
    }
    
    .cloud-intro-left img,
    .cloud-intro-right img {
      width: 100%;
      display: block;
    }
    
    @keyframes introLeaveLeft {
      from { transform: translateX(0);     opacity: 1; }
      to   { transform: translateX(-130%); opacity: 0; }
    }
    
    @keyframes introLeaveRight {
      from { transform: translateX(0);    opacity: 1; }
      to   { transform: translateX(130%); opacity: 0; }
    }

    /* ── DRIFTENDE WOLKE ───────────────────────────────────
       Erscheint nachdem Intro-Wolken weg sind.
       Zieht in 30s von rechts nach links, endlos.
    ─────────────────────────────────────────────────────── */

    .cloud-drift {
      position: fixed;
      z-index: 3;
      pointer-events: none;
      width: 90vw;
      top: 60%;
      opacity: 0;
      animation:
        cloudFadeIn  0.8s ease            forwards  0.1s,
        cloudDrift   30s  linear          infinite  0.1s,
        cloudFloat   9s   ease-in-out     infinite  0.1s;
    }

    .cloud-drift img {
      width: 100%;
      display: block;
    }

    @keyframes cloudFadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    @keyframes cloudDrift {
      from { transform: translateX(110vw); }
      to   { transform: translateX(-110%); }
    }

    @keyframes cloudFloat {
      0%, 100% { margin-top: 0px; }
      50%       { margin-top: 22px; }
    }

    /* ── Responsive ──────────────────────────────────────── */
    @media (max-width: 480px) {
      .title    { letter-spacing: 0.35em; }
      .subtitle { letter-spacing: 0.28em; }
    }

    .cloud-drift-2 {
      position: fixed;
      z-index: 3;
      pointer-events: none;
      width: 55vw;
      top: 25%;
      opacity: 0;
      animation:
        cloudFadeIn  0.8s ease            forwards  13s,
        cloudDrift   43s  linear          infinite  13s,
        cloudFloat   9s   ease-in-out     infinite  13s;
    }
    
    .cloud-drift-2 img {
      width: 100%;
      display: block;
    }  
  </style>
</head>
<body>

  <video
    class="bg-video"
    src="background.mp4"
    autoplay
    muted
    loop
    playsinline
    preload="auto"
  ></video>

  <div class="cloud-intro-left">
  <img src="cloud2.png" alt="" />
  </div>
  
  <div class="cloud-intro-right">
    <img src="cloud.png" alt="" />
  </div>

  <!-- Driftende Wolke -->
  <div class="cloud-drift">
    <img src="cloud.png" alt="" />
  </div>
  <div class="cloud-drift-2">
  <img src="cloud2.png" alt="" />
  </div>

  <div class="page">

    <header class="header">
      <h1 class="title">Faraway</h1>
    </header>

    <main class="main">
      <div class="embed-shell">
        <div class="vimeo-ratio">
          <iframe
            src="https://drive.google.com/file/d/1qkXnWU6GWfmTUMUAEcaB5CIsowSGdmMr/preview"
            allow="autoplay; fullscreen"
            allowfullscreen
            title="Faraway"
          ></iframe>
        </div>
      </div>
    </main>

  </div>

</body>
</html>
