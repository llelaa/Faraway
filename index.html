<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Faraway</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Caprasimo&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --cream:   #f0ece3;
      --muted:   rgba(240, 236, 227, 0.42);
      --dark:    #04040f;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--dark);
      color: var(--cream);
    }

    /* ── Background video ───────────────────────────────── */
    .bg-video {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
      pointer-events: none;
    }

    /* ── Layered overlay: vignette + atmospheric darkness ── */
  

    /* ── Page layout ─────────────────────────────────────── */
    .page {
      position: fixed;
      inset: 0;
      z-index: 2;
      display: grid;
      grid-template-rows: auto 1fr;
      padding: clamp(1.8rem, 4vw, 3.5rem) clamp(1rem, 4vw, 3rem) 2rem;
    }

    /* ── Header / title ─────────────────────────────────── */
    .header {
      text-align: center;
      opacity: 0;
      animation: riseIn 2s cubic-bezier(0.22, 1, 0.36, 1) forwards 0.2s;
    }

    .title {
      font-family: 'Caprasimo', serif;
      font-weight: 400;
      font-size: clamp(2.8rem, 7.5vw, 6.5rem);
      letter-spacing: 0.05em;
      color: #ff3131;
      line-height: 1;
      /* very faint glow to lift it off the video */
      text-shadow: 0 0 60px rgba(240, 236, 227, 0.08);
    }

    .subtitle {
      display: block;
      margin-top: 0.6em;
      font-family: 'Jost', sans-serif;
      font-weight: 100;
      font-size: clamp(0.6rem, 1.4vw, 0.82rem);
      letter-spacing: 0.48em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ── Center: Vimeo embed ─────────────────────────────── */
    .main {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .embed-shell {
      opacity: 0;
      animation: riseIn 2.2s cubic-bezier(0.22, 1, 0.36, 1) forwards 0.9s;
      width: min(680px, 88vw);
    }

    .vimeo-ratio {
      position: relative;
      padding-top: 56.25%; /* 16:9 */
      border-radius: 3px;
      overflow: hidden;
      /* thin luminous border */
      box-shadow:
        0 0 0 1px rgba(240, 236, 227, 0.08),
        0 8px 60px rgba(4, 4, 15, 0.85),
        0 2px 12px rgba(4, 4, 15, 0.6);
    }

    .vimeo-ratio iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
    }

    /* ── Animations ──────────────────────────────────────── */
    @keyframes riseIn {
      from {
        opacity: 0;
        transform: translateY(28px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ── Responsive: small screens ───────────────────────── */
    @media (max-width: 480px) {
      .title {
        letter-spacing: 0.35em;
      }
      .subtitle {
        letter-spacing: 0.28em;
      }
    }
  </style>
</head>
<body>

  <!-- ── Background video (replace background.mp4 with your filename) ── -->
  <video
    class="bg-video"
    src="background.mp4"
    autoplay
    muted
    loop
    playsinline
    preload="auto"
  ></video>

  <div class="overlay"></div>

  <div class="page">

    <!-- ── Title ── -->
    <header class="header">
      <h1 class="title">Faraway</h1>
    </header>

    <!-- ── Vimeo embed ── -->
    <main class="main">
      <div class="embed-shell">
        <div class="vimeo-ratio">
          <!--
            Ersetze DEINE_VIDEO_ID mit der echten Vimeo-Video-ID.
            Beispiel: https://vimeo.com/123456789 → ID ist 123456789
          -->
          <iframe
            src="https://player.vimeo.com/video/DEINE_VIDEO_ID?color=f0ece3&title=0&byline=0&portrait=0&dnt=1"
            allow="autoplay; fullscreen; picture-in-picture"
            allowfullscreen
            title="Faraway"
          ></iframe>
        </div>
      </div>
    </main>

  </div>

</body>
</html>
